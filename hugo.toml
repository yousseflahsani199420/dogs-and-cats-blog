baseURL = 'https://petzone.website/'
languageCode = 'en-us'
title = 'PetZone - Dog, Cat, Health, Food, and Training Guides'
theme = 'PaperMod'
enableRobotsTXT = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.7
  filename = 'sitemap.xml'

[params]
  author = 'PetZone Editorial Team'
  description = 'Practical guides for dog care, cat care, pet health, pet food, and pet training.'
  keywords = ['pet care tips', 'dog care', 'cat care', 'pet health', 'pet food', 'pet training']
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

[params.profileMode]
  enabled = true
  title = 'PetZone'
  subtitle = 'Practical guides for daily pet care and training.'
  imageUrl = '/images/logo.png'
  imageWidth = 150
  imageHeight = 150

[[params.profileMode.buttons]]
  name = 'Dog Care'
  url = '/dog-care/'

[[params.profileMode.buttons]]
  name = 'Cat Care'
  url = '/cat-care/'

[[params.profileMode.buttons]]
  name = 'Pet Health'
  url = '/pet-health/'

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/yousseflahsani199420'

